<!DOCTYPE html>
<html>
<head>
  <title>Try Yourself</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<h2 id="title"></h2>

<p>Gray = Inactive | Blue = Selected | Green = Activated</p>

<svg id="graph" width="700" height="450"></svg>

<div>
  <button onclick="check()">Submit</button>
  <button onclick="reset()">Reset</button>
</div>

<p id="result"></p>

<script>

// ---------- GET TYPE ----------
let params = new URLSearchParams(window.location.search);
let type = params.get("type") || "complete";

// 🔥 BULLETPROOF FLAG
let isMaxTime = (type === "maxtime");

console.log("TYPE =", type);
console.log("isMaxTime =", isMaxTime);

let nodes = [];
let links = [];
let n = 6;

// ---------- TITLE ----------
document.getElementById("title").innerText =
  type === "complete" ? "Complete Graph (WTSS)" :
  type === "tree" ? "Tree (WTSS)" :
  "Max Activation Time (Tree)";

// ---------- CREATE NODES ----------
for(let i=0;i<n;i++){
  nodes.push({
    id:i,
    x:Math.random()*600+50,
    y:Math.random()*350+50,
    t:1,
    w: Math.floor(Math.random()*9)+1,
    active:false,
    selected:false
  });
}

// ---------- GRAPH CREATION ----------

// COMPLETE GRAPH
if(type === "complete"){
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      links.push({source:i,target:j});
    }
  }

  nodes.forEach(node => {
    let deg = nodes.length - 1;
    node.t = Math.floor(Math.random() * deg) + 1;
    if (isNaN(node.t)) node.t = 1;
  });
}

// TREE (for WTSS + MaxTime)
else{
  for(let i=1;i<nodes.length;i++){
    links.push({source:i,target:Math.floor(Math.random()*i)});
  }

  nodes.forEach(node => {
    let deg = links.filter(l => l.source===node.id || l.target===node.id).length;
    node.t = Math.max(1, Math.floor(Math.random()*(deg+1)));
  });
}

// ---------- DRAW ----------
let svg = d3.select("#graph");

// EDGES
svg.selectAll("line")
  .data(links)
  .enter()
  .append("line")
  .attr("x1", d=>nodes[d.source].x)
  .attr("y1", d=>nodes[d.source].y)
  .attr("x2", d=>nodes[d.target].x)
  .attr("y2", d=>nodes[d.target].y)
  .attr("stroke","#999");

// NODES
svg.selectAll("circle")
  .data(nodes)
  .enter()
  .append("circle")
  .attr("cx", d=>d.x)
  .attr("cy", d=>d.y)
  .attr("r", 22)
  .attr("fill","lightgray")
  .on("click", function(event,d){
    d.selected = !d.selected;
    d.active = d.selected;

    d3.select(this)
      .attr("fill", d.selected ? "#1f77b4" : "lightgray");
  });

// LABELS
svg.selectAll("text")
  .data(nodes)
  .enter()
  .append("text")
  .attr("text-anchor","middle")
  .style("pointer-events","none")
  .each(function(d){
    let t = d3.select(this);

    t.append("tspan")
      .attr("x", d.x)
      .attr("y", d.y - 5)
      .text(d.id);

    t.append("tspan")
      .attr("x", d.x)
      .attr("y", d.y + 10)
      .text(`t=${d.t}${!isMaxTime ? ", w="+d.w : ""}`);
  });

// ---------- ACTIVATION ----------
function check(){

  let time = 0;
  let changed = true;

  while(changed){
    changed = false;
    let newNodes = [];

    nodes.forEach(node=>{
      if(node.active) return;

      let count = 0;

      links.forEach(l=>{
        if(l.source===node.id && nodes[l.target].active) count++;
        if(l.target===node.id && nodes[l.source].active) count++;
      });

      if(count >= node.t){
        newNodes.push(node);
      }
    });

    if(newNodes.length > 0){
      newNodes.forEach(node => node.active = true);
      changed = true;
      time++;
    }
  }

  // UPDATE COLORS
  d3.selectAll("circle")
    .attr("fill", d => {
      if(d.active) return "green";
      if(d.selected) return "#1f77b4";
      return "lightgray";
    });

  let ok = nodes.every(node=>node.active);

  // ✅ FINAL RESULT LOGIC (FIXED)
  let resultText = "";

  if(isMaxTime){
    resultText = ok
      ? "Activated in " + time + " steps ⏱️"
      : "Not fully activated ❌";
  }
  else{
    resultText = ok
      ? "All nodes activated ✅"
      : "Not fully activated ❌";
  }

  document.getElementById("result").innerText = resultText;
}

// RESET
function reset(){
  location.reload();
}

</script>

</body>
</html>
